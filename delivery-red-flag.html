<script>
let totalOptions = 5;
let totalCorrectFlags = 3;

let correctClicks = 0;
let wrongClicks = 0;

let clickedElements = new Set();

let scenarioName = "Delivery Scam";

function checkFlag(element, isCorrect) {

    if (clickedElements.has(element)) return;

    clickedElements.add(element);

    if (isCorrect) {
        element.classList.add("correct");
        correctClicks++;
    } else {
        element.classList.add("incorrect");
        wrongClicks++;
    }

    element.onclick = null;
}

function finishSimulation() {

    let totalSafeOptions = totalOptions - totalCorrectFlags;

    let correctAvoided = totalSafeOptions - wrongClicks;

    let totalCorrectDecisions = correctClicks + correctAvoided;

    let accuracy = (totalCorrectDecisions / totalOptions) * 100;

    // ✅ NEW STRUCTURE (aligned with final-result dashboard)
    let resultEntry = {
        scenario: scenarioName,
        correctClicks: correctClicks,
        wrongClicks: wrongClicks,
        correctAvoided: correctAvoided,
        totalOptions: totalOptions,
        accuracy: Math.round(accuracy),
        date: new Date().toLocaleString()
    };

    // ✅ Store single result for results.html
    localStorage.setItem("simulationResult", JSON.stringify(resultEntry));

    // ✅ Append to global tracking history
    let history = JSON.parse(localStorage.getItem("simulationHistory")) || [];
    history.push(resultEntry);
    localStorage.setItem("simulationHistory", JSON.stringify(history));

    // ✅ NEW FLOW: scenario → results → final dashboard
    window.location.href = "../results.html";
}
</script>
