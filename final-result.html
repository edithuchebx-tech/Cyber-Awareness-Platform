<!DOCTYPE html>
<html>
<head>
    <title>Final Results - Phishing Simulation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #005eb8;
            color: white;
        }

        .score-high {
            color: green;
            font-weight: bold;
        }

        .score-medium {
            color: orange;
            font-weight: bold;
        }

        .score-low {
            color: red;
            font-weight: bold;
        }

        button {
            margin-top: 20px;
            padding: 12px 18px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .primary {
            background-color: #005eb8;
            color: white;
        }

        .primary:hover {
            background-color: #004a94;
        }

        .secondary {
            background-color: #6c757d;
            color: white;
        }

        .secondary:hover {
            background-color: #5a6268;
        }

        .danger {
            background-color: #dc3545;
            color: white;
        }

        .danger:hover {
            background-color: #b02a37;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Phishing Simulation Dashboard</h1>

    <p>Your performance across all simulations:</p>

    <table id="resultsTable">
        <tr>
            <th>Scenario</th>
            <th>Accuracy</th>
            <th>Date</th>
        </tr>
    </table>

    <button class="primary" onclick="goToHub()">
        Back to Simulation Hub
    </button>

    <button class="secondary" onclick="goToNotice()">
        Restart From Beginning
    </button>

    <button class="danger" onclick="resetAll()">
        Reset All Results
    </button>

</div>

<script>
let history = JSON.parse(localStorage.getItem("simulationHistory")) || [];

let table = document.getElementById("resultsTable");

if (history.length === 0) {
    let row = table.insertRow();
    let cell = row.insertCell(0);
    cell.colSpan = 3;
    cell.innerText = "No simulation data available.";
} else {

    history.forEach(entry => {

        let row = table.insertRow();

        let scenario = row.insertCell(0);
        let accuracy = row.insertCell(1);
        let date = row.insertCell(2);

        scenario.innerText = entry.scenario;
        date.innerText = entry.date;

        let scoreClass = entry.accuracy >= 80 ? "score-high" :
                         entry.accuracy >= 50 ? "score-medium" :
                         "score-low";

        accuracy.innerHTML = `<span class="${scoreClass}">${entry.accuracy}%</span>`;
    });
}

// Navigation functions
function goToHub() {
    window.location.href = "simulation-hub.html";
}

function goToNotice() {
    window.location.href = "notice.html";
}

// Reset everything
function resetAll() {
    if (confirm("Are you sure you want to reset all results?")) {
        localStorage.clear();
        location.reload();
    }
}
</script>

</body>
</html>
