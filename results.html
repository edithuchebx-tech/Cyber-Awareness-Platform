<!DOCTYPE html>
<html>
<head>
    <title>Simulation Result</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            padding: 20px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            max-width: 500px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .score {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
        }

        .high { color: green; }
        .medium { color: orange; }
        .low { color: red; }

        button {
            margin-top: 15px;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            background: #005eb8;
            color: white;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Scenario Result</h1>

    <div id="scenario"></div>

    <div class="score" id="score"></div>

    <div id="details"></div>

    <button onclick="goDashboard()">
        View Full Security Dashboard
    </button>

</div>

<script>
let data = JSON.parse(localStorage.getItem("simulationResult"));

if (data) {

    document.getElementById("scenario").innerText =
        "Scenario: " + data.scenario;

    let level = data.accuracy >= 80 ? "high" :
                data.accuracy >= 50 ? "medium" : "low";

    document.getElementById("score").innerHTML =
        `<span class="${level}">${data.accuracy}% Accuracy</span>`;

    document.getElementById("details").innerHTML =
        "Correct Actions: " + data.correctClicks + "<br>" +
        "Incorrect Selections: " + data.wrongClicks + "<br>" +
        "Missed Flags: " + data.correctAvoided;

} else {
    document.getElementById("score").innerText = "No result found.";
}

function goDashboard() {
    window.location.href = "final-result.html";
}
</script>

</body>
</html>
